steps:
- powershell: |
    $version = (Get-Content package.json -Raw | ConvertFrom-Json).dependencies.next
    Write-Host "Next.js version: $version"
    Write-Host "##vso[task.setvariable variable=AZ_DEVOPS_NEXT_JS_VERSION]$version"
  displayName: 'Check Next.js Version for Cache Key'

- task: Cache@2
  displayName: 'Cache Next.JS Build Cache'
  inputs:
    # Rolling cache - keyed by the Next.js version, so upgrading Next.js automatically busts the cache
    # > https://beatcracker.wordpress.com/2020/09/29/implementing-rolling-cache-in-azure-devops/
    key: next | $(AZ_DEVOPS_NEXT_JS_VERSION) | $(Build.SourceVersion) | $(System.JobId)
    restoreKeys: |
      next | $(AZ_DEVOPS_NEXT_JS_VERSION) | $(Build.SourceVersion)
      next | $(AZ_DEVOPS_NEXT_JS_VERSION)
    path: $(CACHE_DIR_NEXT_JS)
